<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0f0ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                        "accent-pink": "#fce7f3",
                        "deep-blue": "#0c151d"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .bloom-soft-shadow {
            filter: drop-shadow(0 0 20px rgba(244, 114, 182, 0.3));
        }
        .bg-gradient-soft {
            background: linear-gradient(180deg, #e0f0ff 0%, #ffffff 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Main Splash Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-between bg-gradient-soft dark:from-background-dark dark:to-slate-900 p-8">
<!-- Top Empty Space for Balance -->
<div class="flex-1"></div>
<!-- Central Branding Element -->
<div class="flex flex-col items-center justify-center space-y-8 animate-fade-in">
<!-- Animated Flower Icon Representation -->
<div class="relative flex items-center justify-center">
<div class="absolute w-48 h-48 bg-pink-100/50 dark:bg-pink-900/20 rounded-full blur-3xl"></div>
<div class="relative flex items-center justify-center text-pink-400 bloom-soft-shadow">
<span class="material-symbols-outlined !text-[120px]" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        local_florist
                    </span>
</div>
</div>
<!-- Logo and Text -->
<div class="text-center space-y-2">
<div class="flex items-center justify-center space-x-2">
<h1 class="text-deep-blue dark:text-slate-100 text-4xl font-bold tracking-tight">NavJeevan</h1>
</div>
<h2 class="text-deep-blue/80 dark:text-slate-300 text-2xl font-semibold">नव जीवन</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-medium max-w-xs mx-auto pt-2">
                    Secure Child Adoption &amp; Mother Support Platform
                </p>
</div>
</div>
<!-- Bottom Loading/Progress Section -->
<div class="flex-1 flex flex-col justify-end w-full max-w-xs pb-12 space-y-6">
<div class="w-full bg-slate-200/50 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
<div class="bg-blue-400 h-full rounded-full" style="width: 65%;"></div>
</div>
<div class="flex flex-col items-center space-y-4">
<span class="text-slate-400 dark:text-slate-500 text-sm font-medium">Setting up your secure space...</span>
<!-- Trust Badges -->
<div class="flex items-center space-x-4 opacity-40 grayscale">
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Secure</span>
</div>
<div class="h-1 w-1 bg-slate-400 rounded-full"></div>
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-sm">favorite</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Compassionate</span>
</div>
</div>
</div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-pink-100/20 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
